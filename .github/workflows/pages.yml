# NOTE: In repo Settings → Pages → set Source to "GitHub Actions".
# Private repos need GitHub Pro for Pages; otherwise the repo must be public.
name: Deploy app to GitHub Pages
on:
  push:
    branches: [master]
    paths: ["Charka Journey/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency: { group: pages, cancel-in-progress: true }

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site (the app folder is the site)
        run: |
          mkdir -p _site
          cp -r "Charka Journey/." _site/
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }
      - uses: actions/deploy-pages@v4
        id: deployment
